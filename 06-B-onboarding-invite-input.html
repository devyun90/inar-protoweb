<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>06-B Invite Code Input</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "surface": "#fcf9f7",
        "surface-container": "#f0edeb",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#1b1c1b",
        "on-surface-variant": "#4f443f",
        "outline": "#82746e",
        "outline-variant": "#d3c3bc",
        "primary": "#5b4133",
        "primary-container": "#755849",
        "secondary": "#755849",
        "secondary-container": "#ffd8c4",
        "error": "#ba1a1a"
      },
      fontFamily: {
        "headline": ["Plus Jakarta Sans", "sans-serif"],
        "body": ["Quicksand", "sans-serif"]
      }
    }
  }
}
</script>
<style>
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  .app-container {
    width: 390px; height: 844px; margin: 0 auto;
    background-color: #fcf9f7; position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .cta-gradient {
    background: linear-gradient(135deg, #755849 0%, #5b4133 100%);
    box-shadow: 0 8px 30px rgba(117, 88, 73, 0.15);
  }
  .cta-disabled {
    background: linear-gradient(135deg, #755849 0%, #5b4133 100%);
    opacity: 0.4; cursor: not-allowed;
  }
  .input-field {
    background: #f0edeb;
    border: none;
    border-radius: 16px;
    height: 52px;
    padding: 0 16px;
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #1b1c1b;
    width: 100%;
    outline: none;
  }
  .input-field:focus {
    box-shadow: 0 0 0 2px #755849;
  }
  .input-field::placeholder {
    color: #82746e;
    font-weight: 500;
  }
  .bottom-sheet {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #ffffff;
    border-radius: 32px 32px 0 0;
    box-shadow: 0 -8px 30px rgba(117, 88, 73, 0.1);
    padding: 12px 24px 32px;
  }
  .handle-bar {
    width: 36px; height: 4px;
    border-radius: 9999px;
    background: #d3c3bc;
    margin: 0 auto 20px;
  }

  /* 모바일: 뷰포트 꽉 채움 (앱 느낌) */
  @media (max-width: 430px) {
    .app-container {
      width: 100% !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    body {
      background: #fcf9f7 !important;
    }
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="app-container flex flex-col">

  <!-- 배경 dim -->
  <div class="absolute inset-0 bg-black/30 z-10"></div>

  <!-- 배경 콘텐츠 (06-A 일부) -->
  <div class="flex-1 opacity-50 px-[24px] pt-[104px]">
    <h1 class="font-headline text-[20px] font-semibold text-on-surface mb-[8px]">어떻게 시작할까요?</h1>
    <p class="font-body text-[16px] font-medium text-on-surface-variant">새로운 홈을 만들거나 초대를 받아 합류해요.</p>
  </div>

  <!-- 바텀시트 -->
  <div class="bottom-sheet z-20">
    <!-- 핸들바 -->
    <div class="handle-bar"></div>

    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-[16px]">
      <h2 class="font-headline text-[18px] font-semibold text-on-surface">초대코드 입력</h2>
      <button class="w-[40px] h-[40px] flex items-center justify-center" aria-label="닫기">
        <span class="material-symbols-outlined text-on-surface-variant" style="font-size: 24px;">close</span>
      </button>
    </div>

    <!-- 안내 -->
    <p class="font-body text-[15px] font-medium text-on-surface-variant mb-[20px]">가족에게 받은 초대코드를 입력해 주세요.</p>

    <!-- 코드 입력 필드 -->
    <input type="text" class="input-field mb-[8px]" placeholder="INV-XXXXXXXX" aria-label="초대코드 입력" value=""/>

    <!-- 에러 메시지 (숨김 상태) -->
    <!-- <p class="font-body text-[12px] font-medium text-error mb-[16px]">만료되었거나 취소된 초대예요.</p> -->

    <!-- CTA -->
    <div class="mt-[20px]">
      <button class="w-full h-[52px] rounded-full cta-disabled text-white font-body text-[15px] font-semibold flex items-center justify-center"
              aria-label="코드 확인" disabled>
        코드 확인
      </button>
    </div>
  </div>

<div style="position:absolute;bottom:12px;left:12px;z-index:9999;">

<option value="">📱 화면 이동</option>
<option value="index.html">01-A 스플래시</option>

<option value="01-C-server-maintenance.html">01-C 서버 점검</option>
<option value="02-A-auth-login.html">02-A 로그인</option>
<option value="03-A-auth-terms-agree.html">03-A 약관 동의</option>
<option value="04-A-auth-terms-reagree.html">04-A 약관 재동의</option>
<option value="05-A-server-notice-blocking.html">05-A 공지 (블로킹)</option>
<option value="05-B-server-notice-popup.html">05-B 공지 (팝업)</option>
<option value="06-A-onboarding-entry.html">06-A 온보딩 진입</option>
<option value="06-B-onboarding-invite-input.html">06-B 초대코드 입력</option>
<option value="06-C-onboarding-invite-confirm.html">06-C 초대 확인</option>
<option value="07-A-onboarding-baby-profile.html">07-A 아이 프로필</option>
<option value="09-A-home-record-timeline.html">09-A 기록 타임라인</option>
<option value="10-A-record-input-fab-select.html">10-A FAB 선택</option>
<option value="10-B-record-input-breast.html">10-B 모유 입력</option>

<option value="12-A-record-detail.html">12-A 기록 상세</option>
<option value="13-A-record-search.html">13-A 기록 검색</option>
<option value="14-A-todo-list.html">14-A 할일 목록</option>
<option value="15-A-todo-notice-detail.html">15-A 할일 상세</option>
<option value="16-A-metrics-charts.html">16-A 지표 차트</option>
<option value="17-A-settings-home.html">17-A 설정 홈</option>
</select>
</div>
<!-- 🚨 [임시] 화면 이동 마스터 메뉴 끝 -->
