<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>07-A Baby Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "surface": "#fcf9f7",
        "surface-container": "#f0edeb",
        "surface-container-low": "#f6f3f1",
        "on-surface": "#1b1c1b",
        "on-surface-variant": "#4f443f",
        "outline": "#82746e",
        "outline-variant": "#d3c3bc",
        "primary": "#5b4133",
        "primary-container": "#755849",
        "secondary": "#755849",
        "secondary-container": "#ffd8c4",
        "on-secondary-container": "#795c4d"
      },
      fontFamily: {
        "headline": ["Plus Jakarta Sans", "sans-serif"],
        "body": ["Quicksand", "sans-serif"]
      }
    }
  }
}
</script>
<style>
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  .app-container {
    width: 390px; height: 844px; margin: 0 auto;
    background-color: #fcf9f7; position: relative;
    overflow-y: auto; overflow-x: hidden;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .input-field {
    background: #f0edeb; border: none; border-radius: 16px;
    height: 52px; padding: 0 16px; width: 100%;
    font-family: 'Quicksand', sans-serif; font-size: 16px;
    font-weight: 500; color: #1b1c1b; outline: none;
  }
  .input-field:focus { box-shadow: 0 0 0 2px #755849; }
  .input-field::placeholder { color: #82746e; font-weight: 500; }
  .textarea-field {
    background: #f0edeb; border: none; border-radius: 16px;
    padding: 16px; width: 100%; min-height: 80px; resize: none;
    font-family: 'Quicksand', sans-serif; font-size: 16px;
    font-weight: 500; color: #1b1c1b; outline: none;
  }
  .textarea-field:focus { box-shadow: 0 0 0 2px #755849; }
  .textarea-field::placeholder { color: #82746e; font-weight: 500; }
  .cta-gradient {
    background: linear-gradient(135deg, #755849 0%, #5b4133 100%);
    box-shadow: 0 8px 30px rgba(117, 88, 73, 0.15);
  }
  .cta-disabled {
    background: linear-gradient(135deg, #755849 0%, #5b4133 100%);
    opacity: 0.4; cursor: not-allowed;
  }
  .gender-chip {
    height: 44px; border-radius: 9999px; padding: 0 20px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    background: #f6f3f1; border: 1px solid #d3c3bc; color: #4f443f;
  }
  .gender-chip.selected {
    background: #ffd8c4; border-color: #755849; color: #5b4133;
  }
  .field-label {
    font-family: 'Quicksand', sans-serif;
    font-size: 13px; font-weight: 700; color: #4f443f;
    margin-bottom: 8px; display: block;
  }

  /* 모바일: 뷰포트 꽉 채움 (앱 느낌) */
  @media (max-width: 430px) {
    .app-container {
      width: 100% !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    body {
      background: #fcf9f7 !important;
    }
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="app-container flex flex-col">

  <!-- Header -->
  <header class="flex items-center px-[24px] pt-[56px] pb-[8px] flex-shrink-0">
    <button class="w-[48px] h-[48px] flex items-center justify-center -ml-[12px]" aria-label="뒤로가기">
      <span class="material-symbols-outlined text-on-surface" style="font-size: 24px;">arrow_back</span>
    </button>
  </header>

  <!-- Scrollable Content -->
  <main class="flex-1 overflow-y-auto px-[24px] pb-[32px]">
    <!-- 제목 -->
    <h1 class="font-headline text-[20px] font-semibold text-on-surface mb-[8px]">우리 아이를 알려주세요</h1>
    <p class="font-body text-[16px] font-medium text-on-surface-variant mb-[24px]">기록은 아이별로 따로 관리돼요.</p>

    <!-- 프로필 사진 -->
    <div class="flex justify-center mb-[24px]">
      <div class="w-[96px] h-[96px] rounded-full bg-surface-container flex items-center justify-center cursor-pointer" style="border: 2px dashed #d3c3bc;" aria-label="프로필 사진 추가 (선택)">
        <span class="material-symbols-outlined text-outline" style="font-size: 32px;">photo_camera</span>
      </div>
    </div>

    <!-- 이름 -->
    <label class="field-label">이름 <span class="text-error">*</span></label>
    <input type="text" class="input-field mb-[20px]" placeholder="아이 이름" aria-label="아이 이름, 필수"/>

    <!-- 생년월일 -->
    <label class="field-label">생년월일 <span class="text-error">*</span></label>
    <div class="relative mb-[20px]">
      <input type="text" class="input-field pr-[48px]" placeholder="2025.06.30" aria-label="생년월일, 필수" readonly/>
      <span class="material-symbols-outlined absolute right-[16px] top-1/2 -translate-y-1/2 text-outline" style="font-size: 22px;">calendar_today</span>
    </div>

    <!-- 성별 -->
    <label class="field-label">성별 <span class="text-error">*</span></label>
    <div class="flex gap-[10px] mb-[20px]">
      <div class="gender-chip" role="radio" aria-checked="false">남아</div>
      <div class="gender-chip selected" role="radio" aria-checked="true">여아</div>
      <div class="gender-chip" role="radio" aria-checked="false">선택안함</div>
    </div>

    <!-- 키 -->
    <label class="field-label">키 (선택)</label>
    <div class="relative mb-[20px]">
      <input type="number" class="input-field pr-[48px]" placeholder="" aria-label="키, 센티미터"/>
      <span class="absolute right-[16px] top-1/2 -translate-y-1/2 font-body text-[14px] font-semibold text-outline">cm</span>
    </div>

    <!-- 몸무게 -->
    <label class="field-label">몸무게 (선택)</label>
    <div class="relative mb-[20px]">
      <input type="number" class="input-field pr-[48px]" placeholder="" aria-label="몸무게, 킬로그램"/>
      <span class="absolute right-[16px] top-1/2 -translate-y-1/2 font-body text-[14px] font-semibold text-outline">kg</span>
    </div>

    <!-- 메모 -->
    <label class="field-label">메모 (선택)</label>
    <textarea class="textarea-field mb-[16px]" placeholder="예: 알레르기, 특이사항 등" aria-label="메모, 선택" maxlength="200"></textarea>

    <!-- 안내 힌트 -->
    <div class="flex items-center gap-[8px] mb-[24px]">
      <span class="material-symbols-outlined text-primary-container" style="font-size: 18px;">lightbulb</span>
      <span class="font-body text-[14px] font-medium text-primary-container">키, 몸무게 입력은 성장 관리에 도움돼요</span>
    </div>

    <!-- CTA 저장 -->
    <button class="w-full h-[56px] rounded-full cta-disabled text-white font-body text-[16px] font-semibold flex items-center justify-center mb-[12px]"
            aria-label="저장" disabled>
      저장
    </button>

    <!-- 아이 추가 -->
    <button class="w-full h-[48px] rounded-full bg-transparent border border-primary-container text-primary-container font-body text-[15px] font-bold flex items-center justify-center opacity-40 cursor-not-allowed"
            aria-label="아이 추가" disabled>
      + 아이 추가
    </button>
  </main>


<!-- 🚨 [임시] 화면 이동 마스터 메뉴 시작 -->
<div style="position:absolute;bottom:12px;left:12px;z-index:9999;">
<select onchange="if(this.value)window.location.href=this.value" style="font-size:11px;padding:5px 7px;border-radius:8px;border:1px solid #d3c3bc;background:#f0edeb;color:#4f443f;font-family:'Quicksand',sans-serif;font-weight:600;box-shadow:0 4px 12px rgba(117,88,73,0.15);max-width:150px;cursor:pointer;opacity:0.85;">
<option value="">📱 화면 이동</option>
<option value="index.html">01-A 스플래시</option>
<option value="01-B-force-update.html">01-B 강제 업데이트</option>
<option value="01-C-server-maintenance.html">01-C 서버 점검</option>
<option value="02-A-auth-login.html">02-A 로그인</option>
<option value="03-A-auth-terms-agree.html">03-A 약관 동의</option>
<option value="04-A-auth-terms-reagree.html">04-A 약관 재동의</option>
<option value="05-A-server-notice-blocking.html">05-A 공지 (블로킹)</option>
<option value="05-B-server-notice-popup.html">05-B 공지 (팝업)</option>
<option value="06-A-onboarding-entry.html">06-A 온보딩 진입</option>
<option value="06-B-onboarding-invite-input.html">06-B 초대코드 입력</option>
<option value="06-C-onboarding-invite-confirm.html">06-C 초대 확인</option>
<option value="07-A-onboarding-baby-profile.html">07-A 아이 프로필</option>
<option value="09-A-home-record-timeline.html">09-A 기록 타임라인</option>
<option value="10-A-record-input-fab-select.html">10-A FAB 선택</option>
<option value="10-B-record-input-breast.html">10-B 모유 입력</option>
<option value="10-C-record-input-formula.html">10-C 분유 입력</option>
<option value="11-A-record-input-sleep.html">11-A 수면 입력</option>
<option value="11-B-record-input-diaper.html">11-B 기저귀 입력</option>
<option value="12-A-record-detail.html">12-A 기록 상세</option>
<option value="13-A-record-search.html">13-A 기록 검색</option>
<option value="14-A-todo-list.html">14-A 할일 목록</option>
<option value="15-A-todo-notice-detail.html">15-A 할일 상세</option>
<option value="16-A-metrics-charts.html">16-A 지표 차트</option>
<option value="17-A-settings-home.html">17-A 설정 홈</option>
</select>
</div>
<!-- 🚨 [임시] 화면 이동 마스터 메뉴 끝 -->
</div>
</body></html>
