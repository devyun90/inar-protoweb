<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>12-A Record Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "surface": "#fcf9f7", "surface-container": "#f0edeb", "surface-container-low": "#f6f3f1",
      "on-surface": "#1b1c1b", "on-surface-variant": "#4f443f",
      "outline": "#82746e", "outline-variant": "#d3c3bc",
      "primary": "#5b4133", "primary-container": "#755849",
      "secondary-container": "#ffd8c4", "error": "#ba1a1a"
    },
    fontFamily: { "headline": ["Plus Jakarta Sans","sans-serif"], "body": ["Quicksand","sans-serif"] }
  }}
}
</script>
<style>
  body { -webkit-font-smoothing: antialiased; }
  .app-container { width: 390px; height: 844px; margin: 0 auto; background-color: #fcf9f7; position: relative; overflow-y: auto; overflow-x: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.05); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .soft-card { background-color: #f0edeb; border: 1px solid #d3c3bc; box-shadow: 0 8px 30px rgba(117,88,73,0.08); border-radius: 20px; padding: 20px; }
  .cta-gradient { background: linear-gradient(135deg, #755849 0%, #5b4133 100%); box-shadow: 0 8px 30px rgba(117,88,73,0.15); }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }

  /* 모바일: 뷰포트 꽉 채움 (앱 느낌) */
  @media (max-width: 430px) {
    .app-container {
      width: 100% !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    body {
      background: #fcf9f7 !important;
    }
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="app-container flex flex-col">

  <!-- App Bar -->
  <header class="flex items-center justify-between px-[16px] pt-[52px] pb-[12px] flex-shrink-0">
    <button class="w-[48px] h-[48px] flex items-center justify-center" aria-label="뒤로가기">
      <span class="material-symbols-outlined text-on-surface" style="font-size: 24px;">arrow_back</span>
    </button>
    <span class="font-headline text-[16px] font-semibold text-on-surface">기록 상세</span>
    <button class="w-[48px] h-[48px] flex items-center justify-center" aria-label="더보기">
      <span class="material-symbols-outlined text-on-surface-variant" style="font-size: 24px;">more_vert</span>
    </button>
  </header>

  <!-- Content -->
  <main class="flex-1 px-[24px] pb-[32px]">

    <!-- 카테고리 헤더 카드 -->
    <div class="soft-card mb-[16px] flex flex-col items-center text-center">
      <div class="w-[56px] h-[56px] rounded-full bg-secondary-container flex items-center justify-center mb-[12px]">
        <span class="material-symbols-outlined text-primary-container" style="font-size: 28px;">baby_changing_station</span>
      </div>
      <span class="font-body text-[14px] font-semibold text-on-surface-variant mb-[4px]">분유</span>
      <span class="font-headline text-[28px] font-bold text-on-surface mb-[4px]">120 ml</span>
      <span class="font-body text-[13px] font-medium text-outline">2025년 6월 30일 (월) 오전 10:30</span>
    </div>

    <!-- 상세 정보 카드 -->
    <div class="soft-card mb-[16px]">
      <div class="info-row border-b border-outline-variant">
        <span class="font-body text-[14px] font-medium text-on-surface-variant">작성자</span>
        <span class="font-body text-[14px] font-semibold text-on-surface">엄마</span>
      </div>
      <div class="info-row border-b border-outline-variant">
        <span class="font-body text-[14px] font-medium text-on-surface-variant">분유 종류</span>
        <span class="font-body text-[14px] font-semibold text-on-surface">압타밀 1단계</span>
      </div>
      <div class="info-row border-b border-outline-variant">
        <span class="font-body text-[14px] font-medium text-on-surface-variant">메모</span>
        <span class="font-body text-[14px] font-semibold text-on-surface">잘 먹었어요</span>
      </div>
      <div class="info-row">
        <span class="font-body text-[14px] font-medium text-on-surface-variant">마지막 수정</span>
        <span class="font-body text-[13px] font-medium text-outline">6/30 10:32 · 엄마</span>
      </div>
    </div>

    <!-- 하단 CTA -->
    <button class="w-full h-[52px] rounded-full cta-gradient text-white font-body text-[15px] font-semibold flex items-center justify-center mb-[12px] transition-opacity active:opacity-80"
            aria-label="수정하기">
      수정하기
    </button>
    <button class="w-full h-[44px] rounded-full bg-transparent text-error font-body text-[14px] font-bold flex items-center justify-center transition-opacity active:opacity-70"
            aria-label="삭제">
      삭제
    </button>
  </main>

<option value="">📱 화면 이동</option>
<option value="index.html">01-A 스플래시</option>

<option value="05-B-server-notice-popup.html">05-B 공지 (팝업)</option>
<option value="06-A-onboarding-entry.html">06-A 온보딩 진입</option>
<option value="06-B-onboarding-invite-input.html">06-B 초대코드 입력</option>
<option value="06-C-onboarding-invite-confirm.html">06-C 초대 확인</option>
<option value="07-A-onboarding-baby-profile.html">07-A 아이 프로필</option>
<option value="09-A-home-record-timeline.html">09-A 기록 타임라인</option>
<option value="10-A-record-input-fab-select.html">10-A FAB 선택</option>
<option value="10-B-record-input-breast.html">10-B 모유 입력</option>

<option value="11-B-record-input-diaper.html">11-B 기저귀 입력</option>
<option value="12-A-record-detail.html">12-A 기록 상세</option>
<option value="13-A-record-search.html">13-A 기록 검색</option>
<option value="14-A-todo-list.html">14-A 할일 목록</option>
<option value="15-A-todo-notice-detail.html">15-A 할일 상세</option>
<option value="16-A-metrics-charts.html">16-A 지표 차트</option>

</select>
</div>
<!-- 🚨 [임시] 화면 이동 마스터 메뉴 끝 -->
</div>
