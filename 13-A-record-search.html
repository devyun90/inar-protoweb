<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>13-A Record Search</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "surface": "#fcf9f7", "surface-container": "#f0edeb", "surface-container-low": "#f6f3f1",
      "on-surface": "#1b1c1b", "on-surface-variant": "#4f443f",
      "outline": "#82746e", "outline-variant": "#d3c3bc",
      "primary": "#5b4133", "primary-container": "#755849",
      "secondary-container": "#ffd8c4"
    },
    fontFamily: { "headline": ["Plus Jakarta Sans","sans-serif"], "body": ["Quicksand","sans-serif"] }
  }}
}
</script>
<style>
  body { -webkit-font-smoothing: antialiased; }
  .app-container { width: 390px; height: 844px; margin: 0 auto; background-color: #fcf9f7; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 0 1px rgba(0,0,0,0.05); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .search-field { background: #f0edeb; border: none; border-radius: 16px; height: 48px; padding: 0 44px 0 44px; width: 100%; font-family: 'Quicksand',sans-serif; font-size: 15px; font-weight: 500; color: #1b1c1b; outline: none; }
  .search-field:focus { box-shadow: 0 0 0 2px #755849; }
  .search-field::placeholder { color: #82746e; }
  .filter-chip { height: 36px; border-radius: 9999px; padding: 0 14px; display: inline-flex; align-items: center; font-family: 'Quicksand',sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: #f6f3f1; border: 1px solid #d3c3bc; color: #4f443f; }
  .filter-chip.selected { background: #ffd8c4; border-color: #755849; color: #5b4133; }
  .date-chip { height: 36px; border-radius: 8px; padding: 0 12px; display: inline-flex; align-items: center; gap: 4px; font-family: 'Quicksand',sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: #f6f3f1; border: 1px solid #d3c3bc; color: #4f443f; }
  .record-card { background-color: #f0edeb; border: 1px solid #d3c3bc; border-radius: 16px; padding: 14px 16px; box-shadow: 0 4px 20px rgba(117,88,73,0.06); }

  /* 모바일: 뷰포트 꽉 채움 (앱 느낌) */
  @media (max-width: 430px) {
    .app-container {
      width: 100% !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    body {
      background: #fcf9f7 !important;
    }
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="app-container">

  <!-- App Bar -->
  <header class="flex items-center justify-between px-[16px] pt-[52px] pb-[8px] flex-shrink-0">
    <button class="w-[48px] h-[48px] flex items-center justify-center" aria-label="뒤로가기">
      <span class="material-symbols-outlined text-on-surface" style="font-size: 24px;">arrow_back</span>
    </button>
    <span class="font-headline text-[16px] font-semibold text-on-surface">기록 검색</span>
    <button class="font-body text-[13px] font-bold text-primary-container px-[12px] h-[36px]" aria-label="초기화">초기화</button>
  </header>

  <!-- 검색 입력 -->
  <div class="relative px-[24px] mb-[12px] flex-shrink-0">
    <span class="material-symbols-outlined absolute left-[36px] top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">search</span>
    <input type="text" class="search-field" placeholder="메모·내용 검색…" aria-label="검색어 입력"/>
    <button class="absolute right-[36px] top-1/2 -translate-y-1/2 w-[32px] h-[32px] flex items-center justify-center" aria-label="검색어 초기화">
      <span class="material-symbols-outlined text-outline" style="font-size: 18px;">close</span>
    </button>
  </div>

  <!-- 기간 -->
  <div class="px-[24px] mb-[12px] flex-shrink-0">
    <span class="font-body text-[12px] font-bold text-on-surface-variant mb-[6px] block">기간</span>
    <div class="flex items-center gap-[8px]">
      <div class="date-chip">
        <span>6/01</span>
        <span class="material-symbols-outlined text-outline" style="font-size: 16px;">expand_more</span>
      </div>
      <span class="font-body text-[13px] text-outline">~</span>
      <div class="date-chip">
        <span>6/30</span>
        <span class="material-symbols-outlined text-outline" style="font-size: 16px;">expand_more</span>
      </div>
    </div>
  </div>

  <!-- 카테고리 필터 -->
  <div class="px-[24px] mb-[12px] flex-shrink-0">
    <span class="font-body text-[12px] font-bold text-on-surface-variant mb-[6px] block">카테고리</span>
    <div class="flex flex-wrap gap-[8px]">
      <div class="filter-chip selected">전체</div>
      <div class="filter-chip">모유</div>
      <div class="filter-chip">분유</div>
      <div class="filter-chip">수면</div>
      <div class="filter-chip">기저귀</div>
      <div class="filter-chip">성장</div>
      <div class="filter-chip">병원</div>
      <div class="filter-chip">예방접종</div>
    </div>
  </div>

  <!-- 구분선 -->
  <div class="h-px bg-outline-variant mx-[24px] flex-shrink-0"></div>

  <!-- 결과 요약 -->
  <div class="px-[24px] py-[10px] flex-shrink-0">
    <span class="font-body text-[12px] font-bold text-outline uppercase tracking-wider">검색 결과 12건</span>
  </div>

  <!-- 결과 리스트 -->
  <main class="flex-1 overflow-y-auto px-[24px] pb-[16px]">

    <!-- 날짜 그룹 -->
    <div class="flex items-center gap-[8px] py-[8px]">
      <span class="font-body text-[12px] font-bold text-outline">6/30 (월)</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>

    <!-- 결과 카드 1 -->
    <div class="record-card mb-[10px]" role="button" aria-label="분유 120ml, 오전 10시 30분">
      <div class="flex items-center gap-[12px]">
        <div class="w-[40px] h-[40px] rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-primary-container" style="font-size: 20px;">baby_changing_station</span>
        </div>
        <div class="flex-1">
          <div class="flex items-center justify-between">
            <span class="font-body text-[15px] font-bold text-on-surface">분유 120ml</span>
            <span class="font-body text-[13px] font-medium text-outline">10:30</span>
          </div>
          <span class="font-body text-[12px] font-medium text-on-surface-variant">엄마 · "잘 먹었어요"</span>
        </div>
        <span class="material-symbols-outlined text-outline-variant" style="font-size: 18px;">chevron_right</span>
      </div>
    </div>

    <!-- 결과 카드 2 -->
    <div class="record-card mb-[10px]" role="button" aria-label="수면 2h 10m, 오전 9시">
      <div class="flex items-center gap-[12px]">
        <div class="w-[40px] h-[40px] rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-primary-container" style="font-size: 20px;">dark_mode</span>
        </div>
        <div class="flex-1">
          <div class="flex items-center justify-between">
            <span class="font-body text-[15px] font-bold text-on-surface">수면 2h 10m</span>
            <span class="font-body text-[13px] font-medium text-outline">09:00</span>
          </div>
          <span class="font-body text-[12px] font-medium text-on-surface-variant">아빠</span>
        </div>
        <span class="material-symbols-outlined text-outline-variant" style="font-size: 18px;">chevron_right</span>
      </div>
    </div>

    <!-- 날짜 그룹 2 -->
    <div class="flex items-center gap-[8px] py-[8px]">
      <span class="font-body text-[12px] font-bold text-outline">6/29 (일)</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>

    <!-- 결과 카드 3 -->
    <div class="record-card mb-[10px]" role="button" aria-label="기저귀 대변, 오후 6시 40분">
      <div class="flex items-center gap-[12px]">
        <div class="w-[40px] h-[40px] rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-primary-container" style="font-size: 20px;">water_drop</span>
        </div>
        <div class="flex-1">
          <div class="flex items-center justify-between">
            <span class="font-body text-[15px] font-bold text-on-surface">기저귀 대변</span>
            <span class="font-body text-[13px] font-medium text-outline">18:40</span>
          </div>
          <span class="font-body text-[12px] font-medium text-on-surface-variant">엄마</span>
        </div>
        <span class="material-symbols-outlined text-outline-variant" style="font-size: 18px;">chevron_right</span>
      </div>
    </div>

  </main>


<!-- 🚨 [임시] 화면 이동 마스터 메뉴 시작 -->
<div style="position:absolute;bottom:12px;left:12px;z-index:9999;">
<select onchange="if(this.value)window.location.href=this.value" style="font-size:11px;padding:5px 7px;border-radius:8px;border:1px solid #d3c3bc;background:#f0edeb;color:#4f443f;font-family:'Quicksand',sans-serif;font-weight:600;box-shadow:0 4px 12px rgba(117,88,73,0.15);max-width:150px;cursor:pointer;opacity:0.85;">
<option value="">📱 화면 이동</option>
<option value="index.html">01-A 스플래시</option>
<option value="01-B-force-update.html">01-B 강제 업데이트</option>
<option value="01-C-server-maintenance.html">01-C 서버 점검</option>
<option value="02-A-auth-login.html">02-A 로그인</option>
<option value="03-A-auth-terms-agree.html">03-A 약관 동의</option>
<option value="04-A-auth-terms-reagree.html">04-A 약관 재동의</option>
<option value="05-A-server-notice-blocking.html">05-A 공지 (블로킹)</option>
<option value="05-B-server-notice-popup.html">05-B 공지 (팝업)</option>
<option value="06-A-onboarding-entry.html">06-A 온보딩 진입</option>
<option value="06-B-onboarding-invite-input.html">06-B 초대코드 입력</option>
<option value="06-C-onboarding-invite-confirm.html">06-C 초대 확인</option>
<option value="07-A-onboarding-baby-profile.html">07-A 아이 프로필</option>
<option value="09-A-home-record-timeline.html">09-A 기록 타임라인</option>
<option value="10-A-record-input-fab-select.html">10-A FAB 선택</option>
<option value="10-B-record-input-breast.html">10-B 모유 입력</option>
<option value="10-C-record-input-formula.html">10-C 분유 입력</option>
<option value="11-A-record-input-sleep.html">11-A 수면 입력</option>
<option value="11-B-record-input-diaper.html">11-B 기저귀 입력</option>
<option value="12-A-record-detail.html">12-A 기록 상세</option>
<option value="13-A-record-search.html">13-A 기록 검색</option>
<option value="14-A-todo-list.html">14-A 할일 목록</option>
<option value="15-A-todo-notice-detail.html">15-A 할일 상세</option>
<option value="16-A-metrics-charts.html">16-A 지표 차트</option>
<option value="17-A-settings-home.html">17-A 설정 홈</option>
</select>
</div>
<!-- 🚨 [임시] 화면 이동 마스터 메뉴 끝 -->
</div>
</body></html>
