<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>16-A Metrics Charts</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "surface": "#fcf9f7", "surface-container": "#f0edeb", "surface-container-low": "#f6f3f1",
      "surface-container-lowest": "#ffffff",
      "on-surface": "#1b1c1b", "on-surface-variant": "#4f443f",
      "outline": "#82746e", "outline-variant": "#d3c3bc",
      "primary": "#5b4133", "primary-container": "#755849",
      "secondary-container": "#ffd8c4"
    },
    fontFamily: { "headline": ["Plus Jakarta Sans","sans-serif"], "body": ["Quicksand","sans-serif"] }
  }}
}
</script>
<style>
  body { -webkit-font-smoothing: antialiased; }
  .app-container { width: 390px; height: 844px; margin: 0 auto; background-color: #fcf9f7; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 0 1px rgba(0,0,0,0.05); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .soft-card { background-color: #f0edeb; border: 1px solid #d3c3bc; box-shadow: 0 4px 20px rgba(117,88,73,0.06); border-radius: 20px; padding: 16px; }
  .subtab { padding: 8px 14px; border-radius: 9999px; font-family: 'Quicksand',sans-serif; font-size: 13px; font-weight: 600; white-space: nowrap; }
  .subtab-active { background: #ffd8c4; color: #5b4133; }
  .subtab-inactive { color: #82746e; }
  .period-chip { height: 32px; border-radius: 8px; padding: 0 12px; display: inline-flex; align-items: center; font-family: 'Quicksand',sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
  .period-active { background: #755849; color: #ffffff; }
  .period-inactive { background: #f6f3f1; color: #4f443f; border: 1px solid #d3c3bc; }
  .bottom-nav { height: 80px; background: #ffffff; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(117,88,73,0.06); display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .nav-pill { padding: 4px 16px; border-radius: 9999px; }
  .nav-pill-active { background: #ffd8c4; }

  /* 모바일: 뷰포트 꽉 채움 (앱 느낌) */
  @media (max-width: 430px) {
    .app-container {
      width: 100% !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    body {
      background: #fcf9f7 !important;
    }
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="app-container">

  <!-- Top App Bar -->
  <header class="flex items-center justify-between px-[24px] pt-[52px] pb-[4px] flex-shrink-0">
    <div class="flex items-center gap-[8px]">
      <span class="font-headline text-[16px] font-bold text-on-surface">하은</span>
      <span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">expand_more</span>
    </div>
    <button class="w-[40px] h-[40px] flex items-center justify-center" aria-label="알림">
      <span class="material-symbols-outlined text-on-surface-variant" style="font-size: 22px;">notifications</span>
    </button>
  </header>

  <!-- 페이지 타이틀 -->
  <div class="px-[24px] pt-[8px] pb-[4px] flex-shrink-0">
    <h1 class="font-headline text-[22px] font-bold text-on-surface">지표</h1>
  </div>

  <!-- 차트 탭 -->
  <div class="flex items-center gap-[4px] px-[24px] py-[8px] flex-shrink-0 overflow-x-auto" style="scrollbar-width: none;">
    <div class="subtab subtab-active">성장</div>
    <div class="subtab subtab-inactive">모유</div>
    <div class="subtab subtab-inactive">분유</div>
    <div class="subtab subtab-inactive">수면</div>
  </div>

  <!-- 기간 필터 -->
  <div class="flex items-center gap-[6px] px-[24px] py-[6px] flex-shrink-0">
    <div class="period-chip period-inactive">1주</div>
    <div class="period-chip period-active">1개월</div>
    <div class="period-chip period-inactive">3개월</div>
    <div class="period-chip period-inactive">6개월</div>
    <div class="period-chip period-inactive">1년</div>
  </div>

  <!-- 차트 콘텐츠 -->
  <main class="flex-1 overflow-y-auto px-[24px] py-[12px]">

    <!-- 키 차트 카드 -->
    <div class="soft-card mb-[16px]">
      <div class="flex items-center justify-between mb-[12px]">
        <span class="font-body text-[14px] font-bold text-on-surface">키 (cm)</span>
        <div class="flex items-center gap-[12px]">
          <div class="flex items-center gap-[4px]">
            <div class="w-[8px] h-[8px] rounded-full bg-primary-container"></div>
            <span class="font-body text-[11px] text-outline">측정</span>
          </div>
          <div class="flex items-center gap-[4px]">
            <div class="w-[12px] h-[2px] border-t-2 border-dashed border-outline"></div>
            <span class="font-body text-[11px] text-outline">WHO</span>
          </div>
        </div>
      </div>
      <!-- 차트 영역 -->
      <div class="h-[160px] bg-surface-container-low rounded-[12px] flex items-end justify-around px-[16px] pb-[24px] pt-[16px] relative">
        <div class="absolute top-[50px] left-[16px] right-[16px] border-t-2 border-dashed border-outline-variant opacity-40"></div>
        <div class="absolute left-[8px] top-[46px] font-body text-[9px] text-outline">50p</div>
        <!-- 시뮬 포인트 -->
        <div class="flex flex-col items-center"><div class="w-[8px] h-[8px] rounded-full bg-primary-container mb-[50px]"></div><span class="font-body text-[10px] text-outline">3월</span></div>
        <div class="flex flex-col items-center"><div class="w-[8px] h-[8px] rounded-full bg-primary-container mb-[62px]"></div><span class="font-body text-[10px] text-outline">4월</span></div>
        <div class="flex flex-col items-center"><div class="w-[8px] h-[8px] rounded-full bg-primary-container mb-[74px]"></div><span class="font-body text-[10px] text-outline">5월</span></div>
        <div class="flex flex-col items-center"><div class="w-[8px] h-[8px] rounded-full bg-primary-container mb-[86px]"></div><span class="font-body text-[10px] text-outline">6월</span></div>
        <div class="flex flex-col items-center"><div class="w-[8px] h-[8px] rounded-full bg-primary-container mb-[96px]"></div><span class="font-body text-[10px] text-outline">7월</span></div>
      </div>
    </div>

    <!-- 요약 카드 -->
    <div class="soft-card">
      <span class="font-body text-[13px] font-bold text-on-surface-variant mb-[8px] block">최근 측정 요약</span>
      <div class="flex items-center justify-between">
        <span class="font-body text-[14px] font-medium text-on-surface">키 67.2cm · 몸무게 7.8kg</span>
        <span class="font-body text-[12px] text-outline">6/28 측정</span>
      </div>
      <div class="mt-[4px]">
        <span class="font-body text-[12px] text-primary-container font-semibold">WHO 백분위: 키 50p · 몸무게 60p</span>
      </div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="nav-item">
      <div class="nav-pill"><span class="material-symbols-outlined text-on-surface-variant" style="font-size: 24px;">home</span></div>
      <span class="font-body text-[11px] font-medium text-on-surface-variant">홈</span>
    </div>
    <div class="nav-item">
      <div class="nav-pill nav-pill-active"><span class="material-symbols-outlined filled text-primary-container" style="font-size: 24px;">monitoring</span></div>
      <span class="font-body text-[11px] font-bold text-primary-container">지표</span>
    </div>
    <div class="nav-item">
      <div class="nav-pill"><span class="material-symbols-outlined text-on-surface-variant" style="font-size: 24px;">photo_library</span></div>
      <span class="font-body text-[11px] font-medium text-on-surface-variant">앨범</span>
    </div>
    <div class="nav-item">
      <div class="nav-pill"><span class="material-symbols-outlined text-on-surface-variant" style="font-size: 24px;">settings</span></div>
      <span class="font-body text-[11px] font-medium text-on-surface-variant">설정</span>
    </div>
  </nav>


<!-- 🚨 [임시] 화면 이동 마스터 메뉴 시작 -->
<div style="position:absolute;bottom:12px;left:12px;z-index:9999;">
<select onchange="if(this.value)window.location.href=this.value" style="font-size:11px;padding:5px 7px;border-radius:8px;border:1px solid #d3c3bc;background:#f0edeb;color:#4f443f;font-family:'Quicksand',sans-serif;font-weight:600;box-shadow:0 4px 12px rgba(117,88,73,0.15);max-width:150px;cursor:pointer;opacity:0.85;">
<option value="">📱 화면 이동</option>
<option value="index.html">01-A 스플래시</option>
<option value="01-B-force-update.html">01-B 강제 업데이트</option>
<option value="01-C-server-maintenance.html">01-C 서버 점검</option>
<option value="02-A-auth-login.html">02-A 로그인</option>
<option value="03-A-auth-terms-agree.html">03-A 약관 동의</option>
<option value="04-A-auth-terms-reagree.html">04-A 약관 재동의</option>
<option value="05-A-server-notice-blocking.html">05-A 공지 (블로킹)</option>
<option value="05-B-server-notice-popup.html">05-B 공지 (팝업)</option>
<option value="06-A-onboarding-entry.html">06-A 온보딩 진입</option>
<option value="06-B-onboarding-invite-input.html">06-B 초대코드 입력</option>
<option value="06-C-onboarding-invite-confirm.html">06-C 초대 확인</option>
<option value="07-A-onboarding-baby-profile.html">07-A 아이 프로필</option>
<option value="09-A-home-record-timeline.html">09-A 기록 타임라인</option>
<option value="10-A-record-input-fab-select.html">10-A FAB 선택</option>
<option value="10-B-record-input-breast.html">10-B 모유 입력</option>
<option value="10-C-record-input-formula.html">10-C 분유 입력</option>
<option value="11-A-record-input-sleep.html">11-A 수면 입력</option>
<option value="11-B-record-input-diaper.html">11-B 기저귀 입력</option>
<option value="12-A-record-detail.html">12-A 기록 상세</option>
<option value="13-A-record-search.html">13-A 기록 검색</option>
<option value="14-A-todo-list.html">14-A 할일 목록</option>
<option value="15-A-todo-notice-detail.html">15-A 할일 상세</option>
<option value="16-A-metrics-charts.html">16-A 지표 차트</option>
<option value="17-A-settings-home.html">17-A 설정 홈</option>
</select>
</div>
<!-- 🚨 [임시] 화면 이동 마스터 메뉴 끝 -->
</div>
</body></html>
