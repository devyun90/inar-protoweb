<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>18-A Settings Baby</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "surface": "#fcf9f7", "surface-container": "#f0edeb", "surface-container-low": "#f6f3f1",
      "surface-container-lowest": "#ffffff",
      "on-surface": "#1b1c1b", "on-surface-variant": "#4f443f",
      "outline": "#82746e", "outline-variant": "#d3c3bc",
      "primary": "#5b4133", "primary-container": "#755849",
      "on-primary": "#ffffff",
      "secondary-container": "#ffd8c4",
      "error": "#ba1a1a", "error-container": "#ffdad6"
    },
    fontFamily: { "headline": ["Plus Jakarta Sans","sans-serif"], "body": ["Quicksand","sans-serif"] }
  }}
}
</script>
<style>
  body { -webkit-font-smoothing: antialiased; }
  .app-container { width: 390px; height: 844px; margin: 0 auto; background-color: #fcf9f7; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 0 1px rgba(0,0,0,0.05); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .soft-card { background-color: #f0edeb; border: 1px solid #d3c3bc; box-shadow: 0 4px 20px rgba(117,88,73,0.06); border-radius: 20px; }
  .dashed-card { border: 2px dashed #d3c3bc; border-radius: 20px; background: transparent; }
  .bottom-nav { height: 80px; background: #ffffff; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(117,88,73,0.06); display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .nav-pill { padding: 4px 16px; border-radius: 9999px; }
  .nav-pill-active { background: #ffd8c4; }

  @media (max-width: 430px) {
    .app-container {
      width: 100% !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    body {
      background: #fcf9f7 !important;
    }
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="app-container">

  <!-- Top App Bar -->
  <header class="flex items-center px-[24px] h-[56px] flex-shrink-0 bg-surface">
    <button class="w-[40px] h-[40px] flex items-center justify-center -ml-2">
      <span class="material-symbols-outlined text-on-surface" style="font-size:24px;">arrow_back</span>
    </button>
    <h1 class="font-headline text-[18px] font-bold text-on-surface flex-1 ml-[4px]">아이 관리</h1>
    <button class="flex items-center gap-[4px] px-[12px] h-[36px] rounded-full bg-secondary-container">
      <span class="material-symbols-outlined text-primary-container" style="font-size:18px;">add</span>
      <span class="font-body text-[13px] font-bold text-primary-container">추가</span>
    </button>
  </header>

  <!-- Content -->
  <main class="flex-1 overflow-y-auto px-[24px] py-[16px]">

    <!-- 섹션: 활성 아이 -->
    <span class="font-body text-[12px] font-bold text-outline uppercase tracking-wider mb-[8px] block">활성 아이</span>
    <div class="soft-card p-[20px] mb-[24px]">
      <div class="flex items-center gap-[14px]">
        <div class="w-[48px] h-[48px] rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
          <span class="font-headline text-[16px] font-bold text-primary-container">하</span>
        </div>
        <div class="flex-1">
          <div class="flex items-center gap-[8px]">
            <span class="font-body text-[16px] font-bold text-on-surface">하은</span>
            <span class="inline-flex items-center px-[8px] py-[2px] rounded-full bg-[#d4edda] font-body text-[11px] font-bold text-[#2d6a4f]">활성</span>
          </div>
          <span class="font-body text-[13px] font-medium text-on-surface-variant block mt-[2px]">여 · 2024.06.01 (생후 7개월)</span>
        </div>
        <span class="material-symbols-outlined text-outline-variant" style="font-size:18px;">chevron_right</span>
      </div>
    </div>

    <!-- 섹션: 다른 아이 -->
    <span class="font-body text-[12px] font-bold text-outline uppercase tracking-wider mb-[8px] block">다른 아이</span>
    <div class="soft-card p-[20px] mb-[16px]">
      <div class="flex items-center gap-[14px]">
        <div class="w-[48px] h-[48px] rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
          <span class="font-headline text-[16px] font-bold text-primary-container">도</span>
        </div>
        <div class="flex-1">
          <span class="font-body text-[16px] font-bold text-on-surface block">도윤</span>
          <span class="font-body text-[13px] font-medium text-on-surface-variant block mt-[2px]">남 · 2022.03.10 (만 3세)</span>
          <button class="mt-[6px] font-body text-[13px] font-bold text-primary">전환하기</button>
        </div>
        <span class="material-symbols-outlined text-outline-variant" style="font-size:18px;">chevron_right</span>
      </div>
    </div>

    <!-- 아이 추가 카드 (ADMIN) -->
    <div class="dashed-card flex items-center justify-center gap-[8px] h-[64px] cursor-pointer">
      <span class="material-symbols-outlined text-outline" style="font-size:22px;">add</span>
      <span class="font-body text-[14px] font-bold text-outline">아이 추가</span>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="nav-item">
      <div class="nav-pill"><span class="material-symbols-outlined text-on-surface-variant" style="font-size:24px;">home</span></div>
      <span class="font-body text-[11px] font-medium text-on-surface-variant">홈</span>
    </div>
    <div class="nav-item">
      <div class="nav-pill"><span class="material-symbols-outlined text-on-surface-variant" style="font-size:24px;">monitoring</span></div>
      <span class="font-body text-[11px] font-medium text-on-surface-variant">지표</span>
    </div>
    <div class="nav-item">
      <div class="nav-pill"><span class="material-symbols-outlined text-on-surface-variant" style="font-size:24px;">photo_library</span></div>
      <span class="font-body text-[11px] font-medium text-on-surface-variant">앨범</span>
    </div>
    <div class="nav-item">
      <div class="nav-pill nav-pill-active"><span class="material-symbols-outlined filled text-primary-container" style="font-size:24px;">settings</span></div>
      <span class="font-body text-[11px] font-bold text-primary-container">설정</span>
    </div>
  </nav>

<option value="09-A-home-record-timeline.html">09-A 기록 타임라인</option>
<option value="10-A-record-input-fab-select.html">10-A FAB 선택</option>

<option value="25-A-common-states.html">25-A 공통 상태</option>
<option value="26-A-ai-placeholder.html">26-A AI 플레이스홀더</option>

</select>
</div>
<!-- 🚨 [임시] 화면 이동 마스터 메뉴 끝 -->
</div>
</body></html>
